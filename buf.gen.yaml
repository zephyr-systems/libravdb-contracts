version: v2
plugins:
  # Go generation (message types only)
  - remote: buf.build/protocolbuffers/go:v1.32.0
    out: .
    opt:
      - paths=source_relative

  # Go gRPC service generation
  - remote: buf.build/grpc/go:v1.3.0
    out: .
    opt:
      - paths=source_relative

  # TypeScript message types
  - remote: buf.build/bufbuild/es:v1.7.2
    out: gen/ts
    opt:
      - target=ts

  # TypeScript gRPC service client (Connect-ES)
  # - remote: buf.build/connectrpc/connect-es:v2.1.2
  #   out: gen/ts
  #   opt:
  #     - target=ts

  # Python message types
  - remote: buf.build/protocolbuffers/python:v28.3
    out: gen/python
    opt:
      - pyi_out=

  # Python gRPC service stubs
  - remote: buf.build/grpc/python:v1.80.0
    out: gen/python