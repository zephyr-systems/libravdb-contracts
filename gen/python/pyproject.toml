[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "libravdb-contracts"
version = "2.0.9"
description = "LibraVDB IPC protocol types — Python protobuf generated"
requires-python = ">=3.10"
dependencies = ["protobuf>=4.21.0", "grpcio>=1.51.0"]

[project.urls]
Home = "https://github.com/zephyr-systems/libravdb-contracts"
Source = "https://github.com/zephyr-systems/libravdb-contracts"

[tool.setuptools.packages.find]
where = ["."]
include = ["libravdb*"]