syntax = "proto3";

package libravdb.ipc.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/xDarkicex/libravdb-contracts/libravdb/ipc/v1;ipcv1";
option java_multiple_files = true;
option java_package = "com.xdarkicex.libravdb.ipc.v1";

// =============================================================================
// Transport envelope
// method: dispatch key (e.g. "insert_text", "compact_session").
// params: serialized bytes of the method-specific *Request message.
// result: serialized bytes of the method-specific *Response message.
// =============================================================================

message RpcRequest {
  uint64 id = 1;
  string method = 2;
  bytes params = 3;
}

message RpcResponse {
  uint64 id = 1;
  bytes result = 2;
  RpcError error = 3;
}

message RpcError {
  string message = 1;
  int32 code = 2;
}

// =============================================================================
// Shared models
// =============================================================================

// Proto map values cannot be repeated; wrap string slices for exclude_by_collection.
message StringList {
  repeated string values = 1;
}

// Mirrors store.SearchResult (libravdbd/store/libravdb.go).
message SearchResult {
  string id = 1;
  double score = 2;
  string text = 3;
  google.protobuf.Struct metadata = 4;
  uint64 version = 5;
}

message MarkdownSourceMeta {
  string source_root = 1;
  string source_path = 2;
  string source_kind = 3;
  string file_hash = 4;
  int64 source_size = 5;
  int64 source_mtime_ms = 6;
  int32 ingest_version = 7;
  string hash_backend = 8;
  // Inode change time in Unix milliseconds. Populated only when the
  // caller has filesystem access to ctime. Zero when unavailable.
  // Used by the plugin for priority ordering. Not used by the daemon
  // for deduplication.
  int64 source_ctime_ms = 9;
}

message DreamPromotionEntry {
  string text = 1;
  double score = 2;
  int32 recall_count = 3;
  int32 unique_queries = 4;
  string section = 5;
  int32 line = 6;
  int32 source_line = 7;
  google.protobuf.Struct metadata = 8;
}

message IngestFeedback {
  // Current number of items waiting in the async ingest worker queue.
  // Zero when daemon runs synchronously. Treat zero as no information.
  int32 queue_depth = 1;
  // Maximum capacity of the ingest worker queue.
  // Zero when daemon runs synchronously.
  int32 queue_capacity = 2;
  // When false the caller must stop sending ingest requests until
  // retry_after_ms has elapsed. Zero value (false in proto3) means
  // no signal — do not interpret zero as a stop instruction.
  // Daemon must explicitly set true to signal readiness.
  bool accept_more = 3;
  // Suggested caller backoff in milliseconds when accept_more is false.
  // Zero means the daemon has no recommendation.
  int32 retry_after_ms = 4;
  // Wall-clock duration of this ingest request in microseconds.
  // Includes AST parse, embedding inference, and store write.
  // Zero when not measured.
  int64 processing_time_us = 5;
  // AST nodes that passed the IngestionGateThreshold quality filter
  // and were written to the vector store.
  int32 nodes_accepted = 6;
  // AST nodes silently dropped by IngestionGateThreshold.
  // High rejected-to-accepted ratio indicates low-value document.
  int32 nodes_rejected = 7;
  // Estimated tokens actually embedded across all accepted nodes,
  // summed after sliding-window expansion. This is the real per-request
  // token consumption the caller can use for budget accounting.
  int32 tokens_ingested = 8;
  // The maximum number of tokens (estimated via heuristic) the daemon
  // will accept in a single request before rejecting it.
  int32 token_burst_limit = 9;
  // The current number of unprocessed chunks sitting in the durable pending collection.
  int32 wal_depth = 10;
  // The maximum acceptable depth of the durable pending collection before the plugin should pause scanning.
  int32 wal_capacity = 11;
}

message AccessCountUpdate {
  string collection = 1;
  repeated string ids = 2;
}

// Kernel message (libravdbd/server/kernel_handlers.go kernelMessage).
message KernelMessage {
  string role = 1;
  string content = 2;
  string id = 3;
}

// assemble_context_internal debug is arbitrary JSON in the current daemon.
message AssembleContextInternalResponse {
  repeated KernelMessage messages = 1;
  int32 estimated_tokens = 2;
  string system_prompt_addition = 3;
  AssemblyDebug debug = 4;
}

message PredictedContext {
  string id = 1;
  string text = 2;
  string reason = 3;
}

// Typed debug payload for assemble_context_internal.
// Mirrors the fields produced by the transport layer's assembleDebugToProto.
message AssemblyDebug {
  bool recovery_trigger_fired = 1;
  bool cross_session_raw_recovery = 2;
  int32 recovery_reserve_tokens = 3;
  repeated RecoveryOrderEntry recovery_deduped_order = 4;
  repeated RecoveryOrderEntry recovery_fitted_order = 5;
}

message RecoveryOrderEntry {
  string id = 1;
  string recovery_scope = 2;
  double final_score = 3;
  int32 token_estimate = 4;
}

// =============================================================================
// AssembleConfigOverrides — canonical contract schema
//
// This is a FLAT message with optional fields only. No oneof, no alternate
// override message. This is the single canonical override message.
//
// Source of truth for daemon handler status: kernel_handlers.go in the
// libravdb daemon repo. Plugin camelCase ↔ proto snake_case mapping follows
// standard protobuf conventions with no custom serialization.
//
// GHOST KEYS — NOT part of this contract. Must NOT be added without explicit
// daemon implementation decision:
//   section7StartupTokenBudgetTokens
//   summaryExpansionConfidenceThreshold
//   summaryExpansionDepth
//   summaryExpansionTokenBudget
//   summaryExpansionPenaltyFactor
//
// FIELD NUMBERING NOTE:
//   Fields 23-29 are followed by 30, 31. This is intentional reservation —
//   field numbers 32+ are available for future use. Do not reassign.
// =============================================================================

// Pointer-backed overrides: optional preserves unset vs zero for Go migration.
message AssembleConfigOverrides {
  // LIVE — fields with confirmed daemon handlers
  optional bool use_session_recall_projection = 1;
  optional bool use_session_summary_search_experiment = 2;
  optional double token_budget_fraction = 3;
  optional double authored_hard_budget_fraction = 4;
  optional double authored_soft_budget_fraction = 5;
  optional double elevated_guidance_budget_fraction = 6;
  optional int32 top_k = 7;
  optional int32 continuity_min_turns = 8;
  optional int32 continuity_tail_budget_tokens = 9;
  optional int32 continuity_prior_context_tokens = 10;

  // DEPRECATED — no daemon handler exists. Do not use until wired.
  // Tracking: confirm no active traffic before major version removal.
  // compact_threshold (field 11) was once used for compaction tuning;
  // the daemon now derives this internally from token budget signals.
  optional int32 compact_threshold = 11;

  optional int32 compact_session_token_budget = 12;
  optional double section7_theta1 = 13;
  optional double section7_kappa = 14;
  optional double section7_hop_eta = 15;
  optional double section7_hop_threshold = 16;
  optional int32 section7_coarse_top_k = 17;
  optional int32 section7_second_pass_top_k = 18;

  // DEPRECATED — no daemon handler exists. Do not use until wired.
  // section7_authority_recency_lambda (field 19) is a latent authority
  // signal that was never connected to the ranking pipeline.
  optional double section7_authority_recency_lambda = 19;

  optional double section7_authority_recency_weight = 20;
  optional double section7_authority_frequency_weight = 21;
  optional double section7_authority_authored_weight = 22;
  optional double recovery_floor_score = 23;
  optional int32 recovery_min_top_k = 24;
  optional double recovery_min_confidence_mean = 25;

  // DEPRECATED — no daemon handler exists. Do not use until wired.
  // recency_lambda_session (field 26) was reserved for session-scoped
  // recency weighting but has no active handler in the daemon.
  optional double recency_lambda_session = 26;

  optional double recency_lambda_user = 27;

  // DEPRECATED — no daemon handler exists. Do not use until wired.
  // recency_lambda_global (field 28) was reserved for global recency
  // weighting but has no active handler in the daemon.
  optional double recency_lambda_global = 28;

  optional double ingestion_gate_threshold = 29;

  // LIVE — plugin PR #160 is adding these; no contract change needed.
  // These fields are actively consumed by the daemon ranking pipeline.
  optional double section7_authority_salience_weight = 30;
  optional double section7_recency_access_lambda = 31;

  // RESERVED — field numbers 32+ are available for future use.
  // Do not reassign existing fields to these numbers.
}

message RankCandidate {
  string id = 1;
  string text = 2;
  double score = 3;
  google.protobuf.Struct metadata = 4;
}

// health.Status (libravdbd/health/check.go) — health RPC.
message HealthResponse {
  bool ok = 1;
  string message = 2;
}

// compact.Result (libravdbd/compact/summarize.go) — compact_session RPC.
message CompactSessionResponse {
  bool did_compact = 1;
  int32 clusters_formed = 2;
  int32 clusters_declined = 3;
  int32 turns_removed = 4;
  string summary_method = 5;
  double mean_confidence = 6;
}

// compact.GatingSignals (libravdbd/compact/gate.go) — gating_scalar RPC.
message GatingScalarResponse {
  double g = 1;
  double t = 2;
  double h = 3;
  double r = 4;
  double d = 5;
  double input_freq = 6;
  double mem_saturation = 7;
  double p = 8;
  double a = 9;
  double dtech = 10;
  double gconv = 11;
  double gtech = 12;
}

message ExportMemoryRecord {
  string collection = 1;
  string id = 2;
  string text = 3;
  google.protobuf.Struct metadata = 4;
}

// =============================================================================
// RPC payloads — libravdbd/server/rpc.go
// =============================================================================

message EnsureCollectionsRequest {
  repeated string collections = 1;
}

message EnsureCollectionsResponse {
  bool ok = 1;
}

message InsertTextRequest {
  string collection = 1;
  string id = 2;
  string text = 3;
  google.protobuf.Struct metadata = 4;
}

message InsertTextResponse {
  bool ok = 1;
}

message InsertSessionTurnRequest {
  string session_id = 1;
  string id = 2;
  string text = 3;
  google.protobuf.Struct metadata = 4;
}

message InsertSessionTurnResponse {
  bool ok = 1;
}

// IngestMode controls whether a call replaces all existing nodes for the source_doc
// or appends/merges them without deleting anything.
enum IngestMode {
  INGEST_MODE_REPLACE = 0;  // default — delete existing nodes, then insert new
  INGEST_MODE_APPEND  = 1;  // skip delete, only insert new nodes
}

message IngestMarkdownDocumentRequest {
  string source_doc = 1;
  string text = 2;
  string tokenizer_id = 3;
  bool core_doc = 4;
  MarkdownSourceMeta source_meta = 5;
  IngestMode mode = 6;  // default INGEST_MODE_REPLACE if absent
}

message IngestMarkdownDocumentResponse {
  bool ok = 1;
  IngestFeedback feedback = 2;
}

message DeleteAuthoredDocumentRequest {
  string source_doc = 1;
}

message DeleteAuthoredDocumentResponse {
  bool ok = 1;
}

message PromoteDreamEntriesRequest {
  string user_id = 1;
  string source_doc = 2;
  string source_root = 3;
  string source_path = 4;
  string source_kind = 5;
  string file_hash = 6;
  int64 source_size = 7;
  int64 source_mtime_ms = 8;
  int32 ingest_version = 9;
  string hash_backend = 10;
  repeated DreamPromotionEntry entries = 11;
  // Inode change time in Unix milliseconds. Mirrors the field added
  // to MarkdownSourceMeta. Zero when unavailable.
  int64 source_ctime_ms = 12;
}

message DreamPromotionResponse {
  int32 promoted = 1;
  int32 rejected = 2;
  IngestFeedback feedback = 3;
}

message SearchTextRequest {
  string collection = 1;
  string text = 2;
  int32 k = 3;
  repeated string exclude_ids = 4;
}

message SearchTextCollectionsRequest {
  repeated string collections = 1;
  string text = 2;
  int32 k = 3;
  map<string, StringList> exclude_by_collection = 4;
}

message SearchTextResponse {
  repeated SearchResult results = 1;
}

message ListByMetaRequest {
  string collection = 1;
  string key = 2;
  string value = 3;
}

message ListCollectionRequest {
  string collection = 1;
}

message ExpandSummaryRequest {
  string session_id = 1;
  string summary_id = 2;
  int32 max_depth = 3;
}

message QueryRawSessionRequest {
  string session_id = 1;
  string text = 2;
  int32 k = 3;
  repeated string exclude_ids = 4;
}

message ListLifecycleJournalRequest {
  string session_id = 1;
  int32 limit = 2;
}

message BumpAccessCountsRequest {
  repeated AccessCountUpdate updates = 1;
}

message BumpAccessCountsResponse {
  bool ok = 1;
}

message DeleteRequest {
  string collection = 1;
  string id = 2;
}

message DeleteResponse {
  bool ok = 1;
}

message DeleteBatchRequest {
  string collection = 1;
  repeated string ids = 2;
}

message DeleteBatchResponse {
  bool ok = 1;
}

message CompactSessionRequest {
  string session_id = 1;
  bool force = 2;
  int32 target_size = 3;
  int32 continuity_min_turns = 4;
  int32 continuity_tail_budget_tokens = 5;
  int32 continuity_prior_context_tokens = 6;
  // Observed token count at compact-request time.
  // Lets the daemon gauge prompt pressure and scale compaction aggressiveness.
  int32 current_token_count = 7;
}

message GatingScalarRequest {
  string user_id = 1;
  string text = 2;
}

message FlushNamespaceRequest {
  string user_id = 1;
  string namespace = 2;
}

message SessionLifecycleHintRequest {
  string hook = 1;
  string reason = 2;
  string session_file = 3;
  string session_id = 4;
  string session_key = 5;
  string agent_id = 6;
  string workspace_dir = 7;
  int32 message_count = 8;
  int32 duration_ms = 9;
  bool transcript_archived = 10;
  string next_session_id = 11;
  string next_session_key = 12;
}

message SessionLifecycleHintResponse {
  bool ok = 1;
  string hook = 2;
  string session_id = 3;
  string reason = 4;
}

message MemoryStatusResponse {
  bool ok = 1;
  string message = 2;
  int32 turn_count = 3;
  int32 memory_count = 4;
  int32 lifecycle_hint_count = 5;
  double gating_threshold = 6;
  bool abstractive_ready = 7;
  string embedding_profile = 8;
}

message ExportMemoryRequest {
  string user_id = 1;
  string namespace = 2;
}

message ExportMemoryResponse {
  repeated ExportMemoryRecord records = 1;
}

message FlushNamespaceResponse {
  bool ok = 1;
}

message FlushResponse {
  bool ok = 1;
}

// =============================================================================
// Kernel RPC payloads — libravdbd/server/kernel_handlers.go (methods in rpc.go)
// =============================================================================

message BootstrapSessionKernelRequest {
  string session_id = 1;
  string session_key = 2;
  string user_id = 3;
}

message BootstrapSessionKernelResponse {
  bool ok = 1;
}

message IngestMessageKernelRequest {
  string session_id = 1;
  string session_key = 2;
  string user_id = 3;
  KernelMessage message = 4;
  bool is_heartbeat = 5;
}

message IngestMessageKernelResponse {
  bool ok = 1;
  int32 ingested = 2;
}

message AfterTurnKernelRequest {
  string session_id = 1;
  string session_key = 2;
  string user_id = 3;
  repeated KernelMessage messages = 4;
  int32 pre_prompt_message_count = 5;
  bool is_heartbeat = 6;
}

message AfterTurnKernelResponse {
  bool ok = 1;
  repeated PredictedContext predictions = 2;
}

message AssembleContextInternalRequest {
  string session_id = 1;
  string session_key = 2;
  string user_id = 3;
  repeated KernelMessage messages = 4;
  int32 token_budget = 5;
  string prompt = 6;
  bool emit_debug = 7;
  AssembleConfigOverrides config = 8;
}

message RankCandidatesRequest {
  repeated RankCandidate candidates = 1;
  string query_text = 2;
  string session_id = 3;
  string user_id = 4;
  int32 k1 = 5;
  int32 k2 = 6;
}

message RankCandidatesResponse {
  repeated RankCandidate ranked = 1;
}

message RebuildIndexRequest {
  string namespace = 1;
  repeated string collections = 2;
}

message RebuildIndexResponse {
  int32 collections_processed = 1;
  int32 records_reindexed = 2;
  int32 collections_recreated = 3;
  repeated string errors = 4;
}

// =============================================================================
// New message types for daemon operations without proto definitions
// =============================================================================

// Cognitive tier metrics from the ranking pipeline.
message CognitiveMetricsRequest {
}

message CognitiveMetricsResponse {
  int64 total_nodes = 1;
  int64 fallbacks = 2;
  int64 identity = 3;
  int64 constraint = 4;
  int64 decision = 5;
  int64 fact = 6;
  int64 preference = 7;
  int64 episode = 8;
  int64 tier_hard = 9;
  int64 tier_soft = 10;
  int64 tier_variant = 11;
  int64 heading_identity = 12;
  int64 heading_constraint = 13;
  int64 heading_workflow = 14;
  int64 heading_background = 15;
  int64 heading_preferences = 16;
  repeated int64 support_buckets = 17;
  bool circuit_open = 18;
  string circuit_reason = 19;
  bool use_cognitive_routing = 20;
}

// ReindexChange describes a single node-level change in a reindex operation.
message ReindexChange {
  int32 ordinal = 1;
  string kind = 2;
  string text_preview = 3;
  int32 legacy_tier = 4;
  int32 cognitive_tier = 5;
  string memory_kind = 6;
  double memory_support = 7;
  string memory_role = 8;
  bool tier_changed = 9;
}

// Result payload for a dry-run reindex — describes what would change without applying it.
message ReindexDryRunResult {
  int32 total_nodes = 1;
  bool promote_tier = 2;
  repeated ReindexChange changes = 3;
}

// Result payload for a live reindex — describes what was applied.
message ReindexLiveResult {
  bool ok = 1;
  bool promote_cognitive_tier = 2;
  int32 nodes_accepted = 3;
  int32 nodes_rejected = 4;
  int32 tokens_ingested = 5;
}

message ReindexAuthoredDocumentRequest {
  string source_doc = 1;
  string text = 2;
  string tokenizer_id = 3;
  bool core_doc = 4;
  MarkdownSourceMeta source_meta = 5;
  bool promote_cognitive_tier = 6;
  bool dry_run = 7;
}

message ReindexAuthoredDocumentResponse {
  string source_doc = 1;
  oneof result {
    ReindexDryRunResult dry_run = 2;
    ReindexLiveResult live = 3;
  }
}

message MarkMemorySupersededRequest {
  string collection = 1;
  string old_id = 2;
  string new_id = 3;
  int64 valid_until = 4;
}

message MarkMemorySupersededResponse {
  bool ok = 1;
}

// =============================================================================
// LibravDB service — single canonical RPC service covering all 33 operations
// All methods are unary. Request and response types are listed explicitly.
// =============================================================================

service LibravDB {
  // Session lifecycle
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Status(MemoryStatusRequest) returns (MemoryStatusResponse);
  rpc Flush(FlushRequest) returns (FlushResponse);
  rpc SessionLifecycleHint(SessionLifecycleHintRequest) returns (SessionLifecycleHintResponse);
  rpc ListLifecycleJournal(ListLifecycleJournalRequest) returns (ListLifecycleJournalResponse);

  // Collections
  rpc EnsureCollections(EnsureCollectionsRequest) returns (EnsureCollectionsResponse);

  // Ingest
  rpc IngestMarkdownDocument(IngestMarkdownDocumentRequest) returns (IngestMarkdownDocumentResponse);
  rpc PromoteDreamEntries(PromoteDreamEntriesRequest) returns (DreamPromotionResponse);
  rpc ReindexAuthoredDocument(ReindexAuthoredDocumentRequest) returns (ReindexAuthoredDocumentResponse);
  rpc DeleteAuthoredDocument(DeleteAuthoredDocumentRequest) returns (DeleteAuthoredDocumentResponse);
  rpc MarkMemorySuperseded(MarkMemorySupersededRequest) returns (MarkMemorySupersededResponse);

  // Insert
  rpc InsertText(InsertTextRequest) returns (InsertTextResponse);
  rpc InsertSessionTurn(InsertSessionTurnRequest) returns (InsertSessionTurnResponse);

  // Ranking and gating
  rpc GatingScalar(GatingScalarRequest) returns (GatingScalarResponse);
  rpc SearchText(SearchTextRequest) returns (SearchTextResponse);
  rpc SearchTextCollections(SearchTextCollectionsRequest) returns (SearchTextResponse);
  rpc BumpAccessCounts(BumpAccessCountsRequest) returns (BumpAccessCountsResponse);

  // Query
  rpc ListCollection(ListCollectionRequest) returns (ListCollectionResponse);
  rpc ListByMeta(ListByMetaRequest) returns (ListByMetaResponse);

  // Memory
  rpc ExportMemory(ExportMemoryRequest) returns (ExportMemoryResponse);
  rpc FlushNamespace(FlushNamespaceRequest) returns (FlushNamespaceResponse);

  // Delete
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc DeleteBatch(DeleteBatchRequest) returns (DeleteBatchResponse);

  // Session
  rpc CompactSession(CompactSessionRequest) returns (CompactSessionResponse);
  rpc ExpandSummary(ExpandSummaryRequest) returns (ExpandSummaryResponse);
  rpc QueryRawSession(QueryRawSessionRequest) returns (QueryRawSessionResponse);

  // Index
  rpc RebuildIndex(RebuildIndexRequest) returns (RebuildIndexResponse);

  // Kernel
  rpc BootstrapSessionKernel(BootstrapSessionKernelRequest) returns (BootstrapSessionKernelResponse);
  rpc IngestMessageKernel(IngestMessageKernelRequest) returns (IngestMessageKernelResponse);
  rpc AfterTurnKernel(AfterTurnKernelRequest) returns (AfterTurnKernelResponse);
  rpc AssembleContextInternal(AssembleContextInternalRequest) returns (AssembleContextInternalResponse);

  // Ranking
  rpc RankCandidates(RankCandidatesRequest) returns (RankCandidatesResponse);

  // Cognitive
  rpc CognitiveMetrics(CognitiveMetricsRequest) returns (CognitiveMetricsResponse);
}

// =============================================================================
// Response message aliases required by the service definition above
// These wrap the bare { ok: bool } responses used by the existing handlers.
// =============================================================================

message HealthRequest {
}

message MemoryStatusRequest {
}

message FlushRequest {
}

message ListLifecycleJournalResponse {
  repeated string entries = 1;
}

message ListCollectionResponse {
  repeated string ids = 1;
}

message ListByMetaResponse {
  repeated SearchResult results = 1;
}

message ExpandSummaryResponse {
  string summary_id = 1;
  string text = 2;
}

message QueryRawSessionResponse {
  repeated KernelMessage messages = 1;
}
